name: User Portal Selenium Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-selenium-tests:
    runs-on: ubuntu-latest

    steps:
      # ── STEP 1: is repo (user-portal) ko checkout karo ──
      - name: User-portal repo checkout karo
        uses: actions/checkout@v4
        with:
          path: user-portal

      # ── STEP 2: backend-api repo ko ALAG SE checkout karo ──
      #
      # login.js / track.js / Visa "script.js" http://localhost:5000/api/...
      # ko call karte hain, jo backend-api repo ka code hai. Isliye us repo
      # ko yahan checkout karke, uska server yahin CI machine pe chalate hain.
      #
      # AGAR backend-api repo PUBLIC hai -> token: line ki zaroorat nahi,
      # neeche wali line hata sakte ho.
      # AGAR backend-api repo PRIVATE hai -> ek Personal Access Token (PAT)
      # bana ke (GitHub -> Settings -> Developer settings -> Fine-grained
      # tokens -> sirf backend-api repo ko "Contents: Read" access do),
      # us token ko IS repo (user-portal) ki Settings -> Secrets ->
      # Actions me "BACKEND_REPO_TOKEN" naam se save karo.
      - name: Backend-api repo checkout karo
        uses: actions/checkout@v4
        with:
          repository: Daksh12345-del/backend-api   # <-- apna username/repo daalo
          token: ${{ secrets.BACKEND_REPO_TOKEN }}        # private repo hai to zaroori, public ho to line hata do
          path: backend-api

      - name: Python 3.11 setup karo
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node.js 20 setup karo
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Google Chrome install karo
        uses: browser-actions/setup-chrome@v1

      - name: Xvfb install karo
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Backend API dependencies install karo
        working-directory: backend-api
        run: npm ci

      - name: Python dependencies install karo
        run: |
          pip install --upgrade pip
          pip install -r user-portal/tests/requirements.txt

      # backend-api repo me .env commit hai (jaisa pehle tha) -> dotenv
      # usko khud utha lega. Agar aage chal ke .env ko GitHub Secrets me
      # move karte ho, to yahan ek extra step se .env generate karna hoga:
      #
      # - name: .env banao secrets se
      #   working-directory: backend-api
      #   run: |
      #     echo "DB_USER=${{ secrets.DB_USER }}" >> .env
      #     echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
      #     echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
      #     echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
      #     echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
      #     echo "PORT=5000" >> .env
      #     echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
      #     echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
      #     echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
      - name: Backend API background me chalao (port 5000)
        working-directory: backend-api
        run: |
          node server.js &
          sleep 3

      - name: User portal background me serve karo (port 5500)
        working-directory: user-portal
        run: |
          python -m http.server 5500 &
          sleep 3

      - name: Selenium tests chalao
        working-directory: user-portal
        run: |
          xvfb-run -a pytest \
                     tests/test_login_success.py \
                     tests/test_visa_application.py \
                     tests/test_appointment.py \
                     tests/test_document.py \
                     tests/test_track.py \
                     -v --html=report.html --self-contained-html

      - name: Test report upload karo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-portal-selenium-report
          path: |
            user-portal/report.html
            user-portal/screenshots/
